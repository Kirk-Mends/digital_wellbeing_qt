name: Build and Upload to App Store
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          # We install everything normally; simple is better here
          pip install PySide6 pyinstaller psutil
          if [ -f req.txt ]; then pip install -r req.txt; fi

      - name: Build App
        run: |
          # Note: We removed the 'universal2' tag to avoid binary mismatch errors. 
          # Apple Silicon Macs can run Intel builds perfectly via Rosetta.
          pyinstaller --noconfirm --windowed \
          --name "DigitalWellbeing" \
          --icon "assets/icons/icon.icns" \
          --add-data "assets:assets" \
          --add-data "core:core" \
          --add-data "ui:ui" \
          main.py

      - name: Upload to App Store Connect
        env:
          APPLE_ID: "kirkmendsa@gmail.com"
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
        run: |
          # Zip it up for Apple
          ditto -c -k --sequesterRsrc --keepParent "dist/DigitalWellbeing.app" "dist/DigitalWellbeing.zip"
          
          # Uploading...
          xcrun altool --upload-app \
            --type osx \
            --file "dist/DigitalWellbeing.zip" \
            --username "$APPLE_ID" \
            --password "$APPLE_PASSWORD"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Mac-App-Build
          path: dist/*.app