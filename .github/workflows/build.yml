name: Build and Upload to App Store
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install PySide6 pyinstaller psutil
          if [ -f req.txt ]; then pip install -r req.txt; fi

      - name: Build App
        run: |
          # 1. Build the .app bundle
          pyinstaller --noconfirm --windowed \
          --name "DigitalWellbeing" \
          --osx-bundle-identifier "com.kirkmends.digitalwellbeing" \
          --icon "assets/icons/icon.icns" \
          --add-data "assets:assets" \
          --add-data "core:core" \
          --add-data "ui:ui" \
          main.py
          
          # 2. Hybrid Versioning Fix:
          # First, try to delete existing entries (ignores error if they don't exist)
          /usr/libexec/PlistBuddy -c "Delete :CFBundleVersion" "dist/DigitalWellbeing.app/Contents/Info.plist" || true
          /usr/libexec/PlistBuddy -c "Delete :CFBundleShortVersionString" "dist/DigitalWellbeing.app/Contents/Info.plist" || true
          
          # Then, add them fresh with the unique GitHub run number
          /usr/libexec/PlistBuddy -c "Add :CFBundleVersion string ${{ github.run_number }}" "dist/DigitalWellbeing.app/Contents/Info.plist"
          /usr/libexec/PlistBuddy -c "Add :CFBundleShortVersionString string 1.0.0" "dist/DigitalWellbeing.app/Contents/Info.plist"

      - name: Upload to App Store Connect
        env:
          APPLE_ID: "kirkmendsa@gmail.com"
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
        run: |
          # Create the zip package
          ditto -c -k --sequesterRsrc --keepParent "dist/DigitalWellbeing.app" "dist/DigitalWellbeing.zip"
          
          # Send it to Apple
          xcrun altool --upload-app \
            --type osx \
            --file "dist/DigitalWellbeing.zip" \
            --username "$APPLE_ID" \
            --password "$APPLE_PASSWORD"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Mac-App-Build
          path: dist/*.app