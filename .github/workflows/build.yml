name: Build and Upload to App Store
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install PySide6 pyinstaller psutil
          if [ -f req.txt ]; then pip install -r req.txt; fi

      - name: Build App
        run: |
          pyinstaller --noconfirm --windowed \
          --name "DigitalWellbeing" \
          --osx-bundle-identifier "com.kirkmends.wellbeing" \
          --icon "assets/icons/icon.icns" \
          --add-data "assets:assets" \
          --add-data "core:core" \
          --add-data "ui:ui" \
          main.py
          
          # Clean and set versions
          /usr/libexec/PlistBuddy -c "Delete :CFBundleVersion" "dist/DigitalWellbeing.app/Contents/Info.plist" || true
          /usr/libexec/PlistBuddy -c "Delete :CFBundleShortVersionString" "dist/DigitalWellbeing.app/Contents/Info.plist" || true
          /usr/libexec/PlistBuddy -c "Add :CFBundleVersion string ${{ github.run_number }}" "dist/DigitalWellbeing.app/Contents/Info.plist"
          /usr/libexec/PlistBuddy -c "Add :CFBundleShortVersionString string 1.3.0" "dist/DigitalWellbeing.app/Contents/Info.plist"

      - name: Upload to App Store Connect
        env:
          APPLE_ID: "kirkmendsa@gmail.com"
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
        run: |
          # We use ditto to create the package Apple expects
          ditto -c -k --sequesterRsrc --keepParent "dist/DigitalWellbeing.app" "dist/DigitalWellbeing.pkg"
          
          # We added the 3 missing flags Apple was asking for in the logs:
          # --apple-id (from your screenshot: 6763799090)
          # --bundle-version
          # --bundle-short-version-string
          xcrun altool --upload-package "dist/DigitalWellbeing.pkg" \
            --type macos \
            --username "$APPLE_ID" \
            --password "$APPLE_PASSWORD" \
            --bundle-id "com.kirkmends.wellbeing" \
            --apple-id "6763799090" \
            --bundle-version "${{ github.run_number }}" \
            --bundle-short-version-string "1.3.0"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Mac-App-Build
          path: dist/*.app