name: Build and Upload to App Store
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install PySide6 pyinstaller psutil numpy pyqtgraph

      - name: Build App
        run: |
          # 1. Build natively first, letting PyInstaller lay out the dependencies naturally
          pyinstaller --noconfirm --windowed \
          --name "K-Mends Wellbeing" \
          --osx-bundle-identifier "com.kirkmends.wellbeing" \
          --icon "assets/icons/icon.icns" \
          --add-data "assets:assets" \
          --add-data "core:core" \
          --add-data "ui:ui" \
          --collect-all PySide6 \
          main.py
          
          APP_PATH="dist/K-Mends Wellbeing.app"
          
          # 2. Flatten symlinks to ensure files are real and signable
          mv "$APP_PATH" "dist/K-Mends-Temp.app"
          cp -RL "dist/K-Mends-Temp.app/" "$APP_PATH"
          rm -rf "dist/K-Mends-Temp.app"

          # 3. MANUALLY RESCUE CUSTOM MODULES OUT OF FRAMEWORKS
          # Forces 'core' and 'ui' into the clean top-level Resources directory where Apple expects data/scripts.
          echo "Moving custom modules out of Frameworks to Resources..."
          mkdir -p "$APP_PATH/Contents/Resources"
          if [ -d "$APP_PATH/Contents/Frameworks/core" ]; then
            mv "$APP_PATH/Contents/Frameworks/core" "$APP_PATH/Contents/Resources/"
          fi
          if [ -d "$APP_PATH/Contents/Frameworks/ui" ]; then
            mv "$APP_PATH/Contents/Frameworks/ui" "$APP_PATH/Contents/Resources/"
          fi

          # 4. Update Info.plist with build numbers
          /usr/libexec/PlistBuddy -c "Delete :CFBundleVersion" "$APP_PATH/Contents/Info.plist" || true
          /usr/libexec/PlistBuddy -c "Delete :CFBundleShortVersionString" "$APP_PATH/Contents/Info.plist" || true
          /usr/libexec/PlistBuddy -c "Add :CFBundleVersion string ${{ github.run_number }}" "$APP_PATH/Contents/Info.plist"
          /usr/libexec/PlistBuddy -c "Add :CFBundleShortVersionString string 1.3.1" "$APP_PATH/Contents/Info.plist"

      - name: Install Apple Certificate
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode --output $CERTIFICATE_PATH
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychains -d user -s $KEYCHAIN_PATH $(security list-keychains -d user | xargs)
          security default-keychain -s $KEYCHAIN_PATH
          security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

      - name: Manual Code Sign (The True Structural Fix)
        run: |
          IDENTITY="VGUZ6D2NST"
          APP_PATH="dist/K-Mends Wellbeing.app"
          ENTITLEMENTS="entitlements.plist"

          echo "1. Cleaning extended attributes..."
          xattr -cr "$APP_PATH"

          echo "2. Signing nested binary components (.dylib, .so) inside Frameworks..."
          # This strictly signs true compiled Mach-O binaries, ignoring raw code folders
          find "$APP_PATH/Contents/Frameworks" -type f \( -name "*.dylib" -o -name "*.so" \) -depth -exec codesign --force --verify --verbose --options runtime --sign "$IDENTITY" {} \; || true

          echo "3. Signing true nested app bundles if any exist..."
          find "$APP_PATH/Contents/Frameworks" -name "*.app" -depth -exec codesign --force --verify --verbose --options runtime --sign "$IDENTITY" {} \; || true

          echo "4. Signing all safe resources and custom assets..."
          # This cleanly signs the python files and assets we relocated to Resources
          find "$APP_PATH/Contents/Resources" -type f -depth -exec codesign --force --verify --verbose --options runtime --sign "$IDENTITY" {} \; || true

          # Extra guard: Clean attributes on the executable specifically before signing
          xattr -cr "$APP_PATH/Contents/MacOS/K-Mends Wellbeing"

          echo "5. Signing the main executable..."
          codesign --force --verify --verbose --options runtime --entitlements "$ENTITLEMENTS" --sign "$IDENTITY" "$APP_PATH/Contents/MacOS/K-Mends Wellbeing"

          echo "6. Final Master Seal..."
          # We don't use --deep here to protect our clean bundle mapping
          codesign --force --verify --verbose --options runtime --entitlements "$ENTITLEMENTS" --sign "$IDENTITY" "$APP_PATH"

      - name: Upload to App Store Connect
        env:
          APPLE_ID: "kirkmendsa@gmail.com"
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
        run: |
          productbuild --complex-the-package-path "dist/K-Mends Wellbeing.app" --identifier "com.kirkmends.wellbeing" --version "1.3.1" "dist/K-MendsWellbeing.pkg"
          xcrun altool --upload-package "dist/K-MendsWellbeing.pkg" --type macos --username "$APPLE_ID" --password "$APPLE_PASSWORD" --apple-id "6763799090" --bundle-version "${{ github.run_number }}" --bundle-short-version-string "1.3.1"