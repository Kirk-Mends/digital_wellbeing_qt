name: Build and Upload to App Store
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          # 1. Update pip
          pip install --upgrade pip
          # 2. Install standard tools
          pip install PySide6 pyinstaller
          # 3. FORCE the Universal version of psutil to fix the build error
          pip install --only-binary=:all: --platform macosx_12_0_universal2 psutil
          # 4. Install any other requirements
          if [ -f req.txt ]; then pip install -r req.txt; fi

      - name: Build Universal App
        run: |
          pyinstaller --noconfirm --windowed \
          --name "DigitalWellbeing" \
          --icon "assets/icons/icon.icns" \
          --target-architecture universal2 \
          --add-data "assets:assets" \
          --add-data "core:core" \
          --add-data "ui:ui" \
          main.py

      - name: Upload to App Store Connect
        env:
          APPLE_ID: "kirkmendsa@gmail.com"
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
        run: |
          ditto -c -k --sequesterRsrc --keepParent "dist/DigitalWellbeing.app" "dist/DigitalWellbeing.zip"
          
          xcrun altool --upload-app \
            --type osx \
            --file "dist/DigitalWellbeing.zip" \
            --username "$APPLE_ID" \
            --password "$APPLE_PASSWORD"

      - name: Upload Artifact (For your own download)
        uses: actions/upload-artifact@v4
        with:
          name: Universal-App-Package
          path: dist/*.app