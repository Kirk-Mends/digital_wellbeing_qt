name: Build and Upload to App Store
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install PySide6 pyinstaller psutil
          if [ -f req.txt ]; then pip install -r req.txt; fi

      - name: Build App
        run: |
          # Use the EXACT bundle ID from your Apple screenshot
          pyinstaller --noconfirm --windowed \
          --name "DigitalWellbeing" \
          --osx-bundle-identifier "com.kirkmends.wellbeing" \
          --icon "assets/icons/icon.icns" \
          --add-data "assets:assets" \
          --add-data "core:core" \
          --add-data "ui:ui" \
          main.py
          
          # Clean slate for the Plist
          /usr/libexec/PlistBuddy -c "Delete :CFBundleVersion" "dist/DigitalWellbeing.app/Contents/Info.plist" || true
          /usr/libexec/PlistBuddy -c "Delete :CFBundleShortVersionString" "dist/DigitalWellbeing.app/Contents/Info.plist" || true
          
          # Bumping to 1.3.0 to skip over your old 1.2.x TestFlight failures
          /usr/libexec/PlistBuddy -c "Add :CFBundleVersion string ${{ github.run_number }}" "dist/DigitalWellbeing.app/Contents/Info.plist"
          /usr/libexec/PlistBuddy -c "Add :CFBundleShortVersionString string 1.3.0" "dist/DigitalWellbeing.app/Contents/Info.plist"

      - name: Upload to App Store Connect
        env:
          APPLE_ID: "kirkmendsa@gmail.com"
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
        run: |
          # Create the package
          ditto -c -k --sequesterRsrc --keepParent "dist/DigitalWellbeing.app" "dist/DigitalWellbeing.zip"
          
          # CRITICAL: We changed --type to 'macos' to fix the iOS error
          xcrun altool --upload-app \
            --type macos \
            --file "dist/DigitalWellbeing.zip" \
            --username "$APPLE_ID" \
            --password "$APPLE_PASSWORD" \
            --bundle-id "com.kirkmends.wellbeing"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Mac-App-Build
          path: dist/*.app