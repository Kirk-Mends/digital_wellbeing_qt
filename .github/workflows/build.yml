name: Build and Upload to App Store
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install PySide6 pyinstaller psutil numpy pyqtgraph

      - name: Build App
        run: |
          # Build the bundle
          pyinstaller --noconfirm --windowed \
          --name "K-Mends Wellbeing" \
          --osx-bundle-identifier "com.kirkmends.wellbeing" \
          --icon "assets/icons/icon.icns" \
          --add-data "assets:assets" \
          --add-data "core:core" \
          --add-data "ui:ui" \
          --collect-all PySide6 \
          --collect-all pyqtgraph \
          main.py
          
          # Use quotes for paths with spaces
          APP_PATH="dist/K-Mends Wellbeing.app"
          /usr/libexec/PlistBuddy -c "Delete :CFBundleVersion" "$APP_PATH/Contents/Info.plist" || true
          /usr/libexec/PlistBuddy -c "Delete :CFBundleShortVersionString" "$APP_PATH/Contents/Info.plist" || true
          /usr/libexec/PlistBuddy -c "Add :CFBundleVersion string ${{ github.run_number }}" "$APP_PATH/Contents/Info.plist"
          /usr/libexec/PlistBuddy -c "Add :CFBundleShortVersionString string 1.3.1" "$APP_PATH/Contents/Info.plist"

      - name: Install Apple Certificate
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode --output $CERTIFICATE_PATH
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

      - name: Manual Code Sign (The Final Boss Fix)
        run: |
          IDENTITY="VGUZ6D2NST"
          APP_NAME="K-Mends Wellbeing"
          APP_PATH="dist/$APP_NAME.app"
          
          # 1. Sign internal libraries and frameworks
          find "$APP_PATH/Contents/Frameworks" -type f \( -name "*.dylib" -or -name "*.framework" -or -name "*.so" \) -print0 | xargs -0 codesign --force --verify --verbose --options runtime --sign "$IDENTITY"

          # 2. NEW: Sign any nested .app bundles (like Assistant.app) found inside the Frameworks
          find "$APP_PATH/Contents/Frameworks" -name "*.app" -print0 | xargs -0 codesign --force --verify --verbose --options runtime --sign "$IDENTITY"

          # 3. Sign the main executable
          codesign --force --verify --verbose --options runtime --entitlements entitlements.plist --sign "$IDENTITY" "$APP_PATH/Contents/MacOS/$APP_NAME"

          # 4. Finalize the main app bundle signature
          codesign --force --verify --verbose --options runtime --entitlements entitlements.plist --sign "$IDENTITY" "$APP_PATH"

      - name: Upload to App Store Connect
        env:
          APPLE_ID: "kirkmendsa@gmail.com"
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
        run: |
          productbuild --complex-the-package-path "dist/K-Mends Wellbeing.app" --identifier "com.kirkmends.wellbeing" --version "1.3.1" "dist/K-MendsWellbeing.pkg"
          
          xcrun altool --upload-package "dist/K-MendsWellbeing.pkg" \
            --type macos \
            --username "$APPLE_ID" \
            --password "$APPLE_PASSWORD" \
            --bundle-id "com.kirkmends.wellbeing" \
            --apple-id "6763799090" \
            --bundle-version "${{ github.run_number }}" \
            --bundle-short-version-string "1.3.1"